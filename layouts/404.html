<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | {{ .Site.Title }}</title>
    {{ $style := resources.Get "scss/blog.scss" | toCSS (dict "outputStyle" "compressed") | fingerprint }}
    <style>{{ (resources.Get "css/Google-Fonts.css" | minify).Content | safeCSS }}</style>
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <h1><a href="{{ .Site.Home.RelPermalink }}">four oh four</a></h1>
      </header>
      <p><a href="{{ .Site.Home.RelPermalink }}">Return to the index.</a></p>
    </div>
  </body>
</html>
